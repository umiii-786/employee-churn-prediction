name: ML Workflow

on: push

jobs:
  dvc-pipeline: 
    name: running-dvc-pipeline
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code
      uses: actions/checkout@v6

    - name: intall python
      uses: actions/setup-python@v3
      with: 
        python-version: 3.12.9

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

    - name: install dependencies
      run: | 
        pip install -r requirements.txt
      
    - name: run pipeline
      env:
        DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
      run: | 
        dvc repro

    - name: test model
      run: |
        python -m unittest testing/testing_model.py

    - name: register-model
      if: success()
      env:
        DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
      run: | 
        python -m scripts.register_model
  
      

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PAT }}
      
    - name: build image
      if: success()
      run: |
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/churn-prediction:latest .
      
    - name: push image
      run: |
       docker push ${{ secrets.DOCKER_HUB_USERNAME }}/churn-prediction:latest
      
  

    


